name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # Gate: never publish a tag that doesn't pass lint, type-check, and tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check src/ tests/

      - name: Mypy (type check)
        run: uv run mypy

      - name: Run tests
        run: uv run pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Least privilege: only the publish job needs the OIDC token.
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
